<script>
function switchLang(lang) {
  document.querySelectorAll("[data-es]").forEach(el => {
    const content = el.getAttribute("data-" + lang);
    if (!content) return;
    if (content.includes("<")) {
      el.innerHTML = content;
    } else {
      el.textContent = content;
    }
  });
}
window.onload = () => switchLang("es");
</script>
